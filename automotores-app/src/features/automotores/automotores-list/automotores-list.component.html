<div class="section-container">
  <h2>Automotores</h2>
  <hr>

  <div class="buttons-section-container">
    <div class="search-container">
      <mat-form-field appearance="outline">
        <mat-label>Buscar por dominio o CUIT</mat-label>
        <input matInput (input)="applyFilter($event)" placeholder="Ej: ABC123 o 2030..." />
        <mat-icon matPrefix>search</mat-icon>
      </mat-form-field>
    </div>


    <button mat-raised-button>+ Crear automotor</button>
  </div>
  <div class="table-container">
    <table *ngIf="dataSource.length > 0" mat-table [dataSource]="dataSource" class="demo-table">

      <!-- Dominio -->
      <ng-container matColumnDef="domain">
        <th mat-header-cell *matHeaderCellDef> Dominio </th>
        <td mat-cell *matCellDef="let element"> {{element.domain}} </td>
      </ng-container>

      <!-- Dueño -->
      <ng-container matColumnDef="owner">
        <th mat-header-cell *matHeaderCellDef> Dueño </th>
        <td mat-cell *matCellDef="let element"> {{element.owner}} </td>
      </ng-container>

      <!-- CUIT -->
      <ng-container matColumnDef="cuit">
        <th mat-header-cell *matHeaderCellDef> CUIT </th>
        <td mat-cell *matCellDef="let element"> {{element.cuit}} </td>
      </ng-container>

      <!-- Fabricación -->
      <ng-container matColumnDef="fabrication">
        <th mat-header-cell *matHeaderCellDef> Fabricación </th>
        <td mat-cell *matCellDef="let element"> {{element.fabrication}} </td>
      </ng-container>

      <!-- Acciones -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> </th>
        <td mat-cell *matCellDef="let element">
          <button mat-button class="btn-edit">
            <mat-icon>edit</mat-icon>
            <p> Editar</p>

          </button>
          <button mat-button class="btn-delete">
            <mat-icon>delete</mat-icon>
            <p> Eliminar</p>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>

  </div>
  <div *ngIf="dataSource.length === 0 && !searchValue" class="no-data">
    No hay automotores cargados
  </div>
  <div *ngIf="dataSource.length === 0 && searchValue" class="no-data">
    No se encontraron resultados
  </div>
</div>
